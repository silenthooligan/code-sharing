# Home Assistant Connect ZBT-2 — Portable Zigbee firmware (community)
# https://github.com/silenthooligan/code-sharing/tree/main/ha-connect-zbt-2-portable
#
# This puts the ZBT-2 onto your Wi-Fi network so it can serve Zigbee from
# anywhere instead of being USB-tethered to your Home Assistant host. It's
# the ZBT-2 analogue of esphome/zwa-2 (which already exists for ZWA-2 but
# not yet for ZBT-2 as of April 2026).
#
# Pair with Home Assistant's ZHA integration:
#     Settings → Devices & Services → ZHA → Set up another instance
#     Serial port: socket://<device-ip>:6638  (or use the ESPHome integration's
#                                              auto-discovered esphome:// URL)
#
# HARDWARE: Nabu Casa Home Assistant Connect ZBT-2 (EFR32MG24 + ESP32-S3)
#   ESP32-S3 GPIO 14 → MG24 RX
#   ESP32-S3 GPIO 13 ← MG24 TX
#   ESP32-S3 GPIO  4 → MG24 RESET (active LOW, open-drain)
#   ESP32-S3 GPIO 10 → MG24 BTL   (active LOW)
#   UART: 460800 8N1
#
# Pin map source: NabuCasa/zwave-esp-bridge branch puddly/zbt2-final
# (same ESP32-S3 ↔ EFR32 wiring as the ZWA-2; only the EFR32 chip differs).

esphome:
  name: home-assistant-zbt-2-zigbee
  friendly_name: Home Assistant ZBT-2 (Zigbee)
  min_version: 2026.3.0
  name_add_mac_suffix: true
  project:
    name: silenthooligan.zbt-2-zigbee
    version: "1.0.0"

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "ZBT-2 Zigbee Setup"

captive_portal:

mdns:
  services:
    - service: "_serial"
      protocol: "_tcp"
      port: 6053
      txt:
        protocol: "esphome"
        radio: "zigbee_ncp"

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: INFO
  baud_rate: 0  # UART is dedicated to the radio — no UART logging

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  id: mg24_uart
  tx_pin: 14
  rx_pin: 13
  baud_rate: 460800
  rx_buffer_size: 2048

serial_proxy:
  name: "MG24 Zigbee NCP"
  port_type: TTL
  uart_id: mg24_uart
  rts_pin:
    number: 4
    inverted: true
    mode:
      output: true
      open_drain: true
  dtr_pin:
    number: 10
    inverted: true
    mode:
      output: true

button:
  - platform: restart
    name: Restart
    entity_category: diagnostic
    disabled_by_default: true

sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: diagnostic
