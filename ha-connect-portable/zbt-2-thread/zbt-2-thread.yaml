# Home Assistant Connect ZBT-2 — Portable Thread / OTBR firmware (community)
# https://github.com/silenthooligan/code-sharing/tree/main/ha-connect-portable
#
# Hardware-identical to home-assistant-zbt-2-zigbee.yaml. The differences
# matter, though — the ZBT-2 Thread role uses oxan/esphome-stream-server
# (raw TCP on port 6638) instead of ESPHome's `serial_proxy`. The official
# OpenThread Border Router image expects spinel+hdlc+uart over a real UART;
# it doesn't speak ESPHome's encrypted native API. Raw TCP can be bridged
# into a pty by socat (or by the ownbee/hass-otbr-docker image's built-in
# socat-otbr-tcp service that does this for you).
#
# Companion stack on the HA host:
#
#   ownbee/hass-otbr-docker  — runs otbr-agent + socat-otbr-tcp + REST API
#     env:
#       - NETWORK_DEVICE=<this-dongle-ip>:6638
#       - DEVICE=/tmp/ttyOTBR        # ownbee's socat creates this
#       - BAUDRATE=460800
#       - FLOW_CONTROL=0
#       - BACKBONE_IF=eth0
#     devices:
#       - /dev/net/tun:/dev/net/tun  # required for wpan0
#     cap_add: [NET_ADMIN]
#     privileged: true
#     network_mode: host
#
#   HA `otbr` integration → http://127.0.0.1:8081
#
# The EFR32MG24 must be running OpenThread RCP firmware (zbt2_openthread_rcp_*.gbl
# from NabuCasa/silabs-firmware-builder releases). See top-level README.

esphome:
  name: home-assistant-zbt-2-thread
  friendly_name: Home Assistant ZBT-2 (Thread)
  min_version: 2026.3.0
  name_add_mac_suffix: true
  project:
    name: silenthooligan.zbt-2-thread
    version: "1.1.0"

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

# oxan/esphome-stream-server — exposes UART as raw TCP for OTBR
external_components:
  - source: github://oxan/esphome-stream-server@master
    components: [stream_server]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "ZBT-2 Thread Setup"

captive_portal:

mdns:
  services:
    - service: "_serial"
      protocol: "_tcp"
      port: 6638
      txt:
        protocol: "spinel"
        radio: "openthread_rcp"

# api: stays enabled (no encryption — keeps it compatible if you also want
# HA's ESPHome integration to discover the dongle for diagnostic sensors).
api:

logger:
  level: INFO
  baud_rate: 0  # UART is dedicated to the radio

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  id: mg24_uart
  tx_pin: 14
  rx_pin: 13
  baud_rate: 460800
  rx_buffer_size: 2048

# Raw TCP UART proxy on port 6638. OTBR connects via TCP; socat bridges
# the TCP stream into a pty that otbr-agent reads as spinel+hdlc+uart.
stream_server:
  uart_id: mg24_uart
  port: 6638

# Expose EFR32 reset + bootloader pins as outputs so OTA / firmware swaps
# can drive them remotely if needed.
output:
  - platform: gpio
    id: mg24_reset
    pin:
      number: 4
      mode:
        output: true
        open_drain: true
      inverted: true
  - platform: gpio
    id: mg24_btl
    pin:
      number: 10
      mode:
        output: true
      inverted: true

button:
  - platform: restart
    id: restart_btn
    name: Restart
    entity_category: diagnostic
    disabled_by_default: true
  - platform: template
    name: Reset MG24 Radio
    entity_category: diagnostic
    on_press:
      - output.turn_on: mg24_reset
      - delay: 100ms
      - output.turn_off: mg24_reset

sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: diagnostic
